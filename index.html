<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Soulex Fotoshow</title>
<style>
@font-face{font-family:'Caveat';font-weight:400;src:url(fonts/caveat-regular.ttf) format('truetype')}
@font-face{font-family:'Caveat';font-weight:700;src:url(fonts/caveat-bold.ttf) format('truetype')}
@font-face{font-family:'Rock Salt';src:url(fonts/rocksalt.ttf) format('truetype')}
@font-face{font-family:'Just Another Hand';src:url(fonts/justanotherhand.ttf) format('truetype')}
@font-face{font-family:'Homemade Apple';src:url(fonts/homemadeapple.ttf) format('truetype')}
@font-face{font-family:'Permanent Marker';src:url(fonts/permanentmarker.ttf) format('truetype')}
@font-face{font-family:'Nanum Pen Script';src:url(fonts/nanumpenscript.ttf) format('truetype')}
</style>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050505;
  overflow:hidden;
  font-family:'Segoe UI',-apple-system,system-ui,sans-serif;
  color:#fff;
}

#start-screen{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#050505;
}
#start-screen.hidden{display:none}
.start-logo{
  width:min(280px,40vw);height:auto;
  filter:drop-shadow(0 0 20px rgba(240,192,64,0.3));
  margin-bottom:10px;
}
.start-subtitle{
  font-size:min(32px,4.5vw);font-weight:300;color:#aaa;
  margin-top:8px;letter-spacing:2px;
}
.start-period{
  font-size:min(22px,3vw);color:#666;margin-top:6px;
}
.settings{
  margin-top:50px;display:flex;flex-direction:column;
  align-items:center;gap:28px;
}
.setting-group{
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.setting-label{
  font-size:14px;color:#888;text-transform:uppercase;
  letter-spacing:2px;font-weight:600;
}
.radio-group{display:flex;gap:4px}
.radio-group label{
  padding:10px 24px;border-radius:6px;cursor:pointer;
  font-size:16px;color:#999;background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);transition:all 0.2s;
}
.radio-group input{display:none}
.radio-group input:checked+span{color:#f0c040}
.radio-group label:has(input:checked){
  background:rgba(240,192,64,0.1);border-color:rgba(240,192,64,0.3);
}
.speed-control{display:flex;align-items:center;gap:16px}
.speed-control input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:200px;height:4px;background:rgba(255,255,255,0.15);
  border-radius:2px;outline:none;
}
.speed-control input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:18px;height:18px;background:#f0c040;border-radius:50%;cursor:pointer;
}
.speed-value{font-size:18px;color:#f0c040;font-weight:600;min-width:40px;text-align:center}
#btn-start{
  margin-top:40px;padding:16px 60px;
  font-size:20px;font-weight:600;color:#0a0a0a;
  background:#f0c040;border:none;border-radius:8px;
  cursor:pointer;letter-spacing:1px;transition:transform 0.15s,box-shadow 0.15s;
}
#btn-start:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(240,192,64,0.3)}
.start-count{margin-top:20px;font-size:15px;color:#555}

#slideshow{
  position:fixed;inset:0;display:none;
  align-items:center;justify-content:center;
}
#slideshow.active{display:flex}

.polaroid{
  position:absolute;
  background:linear-gradient(145deg,#f8f6f0,#eae7df);
  padding:clamp(10px,1.5vw,18px) clamp(10px,1.5vw,18px) clamp(62px,10vh,105px);
  box-shadow:
    0 2px 6px rgba(0,0,0,0.25),
    0 10px 30px rgba(0,0,0,0.35),
    inset 0 0 60px rgba(0,0,0,0.03);
  transform-origin:center center;
  opacity:0;
  -webkit-transition:opacity 0.6s ease,transform 1.2s cubic-bezier(0.2,0.7,0.3,1.08);
  transition:opacity 0.6s ease,transform 1.2s cubic-bezier(0.2,0.7,0.3,1.08);
}
.polaroid.visible{opacity:1}
.polaroid.removing{opacity:0;transition:opacity 0.4s ease}

.polaroid .photo{
  display:block;
  height:85vh;
  border:1px solid rgba(0,0,0,0.06);
}

.polaroid-text{
  position:absolute;
  bottom:clamp(4px,1vh,12px);
  left:clamp(14px,2vw,25px);
  right:clamp(40px,5vw,60px);
  font-family:'Caveat',cursive;
  font-size:clamp(18px,2.8vw,30px);
  color:#4a4540;
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.polaroid-logo{
  position:absolute;
  bottom:clamp(6px,1vh,14px);
  right:clamp(8px,1vw,16px);
  width:clamp(36px,5vw,56px);
  height:auto;
  opacity:0.7;
  object-fit:contain;
}

#title-card{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#050505;
  z-index:20;opacity:0;pointer-events:none;transition:opacity 0.8s ease;
}
#title-card.visible{opacity:1}
.title-year{
  font-family:'Caveat',cursive;
  font-size:min(140px,18vw);font-weight:700;color:#f0c040;line-height:1;
}
.title-event{
  font-family:'Caveat',cursive;
  font-size:min(60px,7vw);font-weight:400;color:#fff;
  margin-top:12px;text-align:center;max-width:80vw;
}
.title-count{
  font-family:'Caveat',cursive;
  font-size:24px;color:#555;margin-top:20px;
}

#info-counter{
  position:fixed;top:20px;right:30px;z-index:10;
  font-size:14px;color:rgba(255,255,255,0.25);pointer-events:none;
}
#progress-bar{
  position:fixed;bottom:0;left:0;right:0;height:3px;
  background:rgba(255,255,255,0.06);z-index:15;transition:opacity 0.5s;
}
#progress-fill{height:100%;background:#f0c040;width:0%}

#controls{
  position:fixed;bottom:30px;right:40px;z-index:30;
  opacity:0;transition:opacity 0.3s;
  display:flex;align-items:center;gap:10px;
}
#controls.visible{opacity:1}
#controls button{
  background:rgba(255,255,255,0.12);color:#fff;border:none;
  width:44px;height:44px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  transition:background 0.2s;
}
#controls button:hover{background:rgba(240,192,64,0.3)}
#btn-back{font-size:13px;width:auto;padding:0 16px;border-radius:22px}
</style>
</head>
<body>

<div id="start-screen">
  <img src="Soulex.png" alt="Soulex" class="start-logo">
  <div class="start-subtitle">Fotoshow</div>
  <div class="start-period">1990 — 2025</div>

  <div class="settings">
    <div class="setting-group">
      <div class="setting-label">Volgorde</div>
      <div class="radio-group">
        <label><input type="radio" name="order" value="chrono" checked><span>Chronologisch</span></label>
        <label><input type="radio" name="order" value="random"><span>Willekeurig</span></label>
      </div>
    </div>
    <div class="setting-group">
      <div class="setting-label">Snelheid</div>
      <div class="speed-control">
        <span style="color:#666;font-size:13px">Snel</span>
        <input type="range" id="speed-slider" min="2" max="15" value="5" step="1">
        <span style="color:#666;font-size:13px">Langzaam</span>
        <span class="speed-value" id="speed-value">5s</span>
      </div>
    </div>
  </div>
  <button id="btn-start" onclick="startShow()">&#9654;&ensp;Start</button>
  <div class="start-count">2302 foto's uit 42 evenementen</div>
</div>

<div id="slideshow"></div>
<div id="title-card">
  <div class="title-year" id="title-year"></div>
  <div class="title-event" id="title-event"></div>
  <div class="title-count" id="title-count"></div>
</div>
<div id="info-counter"></div>
<div id="progress-bar"><div id="progress-fill"></div></div>
<div id="controls">
  <button id="btn-back" onclick="backToStart()">&#9632; Stop</button>
  <button onclick="prevSlide()">&#9664;</button>
  <button id="btn-pp" onclick="togglePlayPause()">&#10074;&#10074;</button>
  <button onclick="nextSlide()">&#9654;</button>
</div>

  var rot=((Math.random()-0.5)*22).toFixed(1);
  var tx=((Math.random()-0.5)*70).toFixed(0);
  var ty=((Math.random()-0.5)*50).toFixed(0);
  var startRot=(parseFloat(rot)+(Math.random()>0.5?1:-1)*15).toFixed(1);
  pol.dataset.rot=rot;pol.dataset.tx=tx;pol.dataset.ty=ty;
  pol.style.transform='rotate('+startRot+'deg) translate('+(tx*1.8)+'px,'+(ty*1.8)+'px) scale(1.18)';

  var img=document.createElement('img');
  img.className='photo';img.src=src;img.alt='';
  pol.appendChild(img);

  var logo=document.createElement('img');
  logo.className='polaroid-logo';logo.src='Soulex.png';logo.alt='';
  pol.appendChild(logo);

  var text=document.createElement('div');
  text.className='polaroid-text';
  var handFonts=['Caveat','Rock Salt','Just Another Hand','Homemade Apple','Permanent Marker','Nanum Pen Script'];
  var inkColors=['#dd1111','#0033cc','#222222','#009933'];
  text.style.fontFamily="'"+handFonts[Math.floor(Math.random()*handFonts.length)]+"',cursive";
  text.style.color=inkColors[Math.floor(Math.random()*inkColors.length)];
  var label=g[1];
  if(g[0]) label+=' \u2014 '+g[0];
  text.textContent=label;
  pol.appendChild(text);

  sl.appendChild(pol);

  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      pol.classList.add('visible');
      pol.style.transform='rotate('+rot+'deg) translate('+tx+'px,'+ty+'px) scale(1)';
    });
  });

  stack.push({el:pol,posIdx:posIdx});

  while(stack.length>MAX_STACK){
    var old=stack.shift();
    old.el.classList.add('removing');
    (function(el){
      setTimeout(function(){el.remove()},500);
    })(old.el);
  }
}

function showPhoto(posIdx){
  createPolaroid(posIdx);
  idx=posIdx;
  ic.textContent=(posIdx+1)+' / '+S.length;
  pf.style.transition='none';pf.style.width='0%';
  pf.offsetWidth;
  pf.style.transition='width '+DUR+'s linear';pf.style.width='100%';
  preload(posIdx,3);
  schedNext();
}

function showSlide(posIdx){
  if(orderMode==='chrono'){
    var prevGi=idx>=0?S[playOrder[idx]][1]:-1;
    var nextGi=S[playOrder[posIdx]][1];
    if(nextGi!==prevGi){
      clearStack();
      showTitle(nextGi,function(){showPhoto(posIdx)});
      return;
    }
  }
  showPhoto(posIdx);
}

function schedNext(){
  clearTimeout(timer);
  if(!playing)return;
  timer=setTimeout(function(){
    showSlide((idx+1)%playOrder.length);
  },DUR*1000);
}

function nextSlide(){
  cancelTitle();clearTimeout(timer);
  var ni=idx<0?0:(idx+1)%playOrder.length;
  showSlide(ni);
}
function prevSlide(){
  cancelTitle();clearTimeout(timer);
  if(stack.length>1){
    var top=stack.pop();
    top.el.classList.add('removing');
    setTimeout(function(){top.el.remove()},500);
    idx=stack[stack.length-1].posIdx;
    pf.style.transition='none';pf.style.width='0%';
    ic.textContent=(idx+1)+' / '+S.length;
    if(playing)schedNext();
  }else{
    var ni=idx<0?0:(idx-1+playOrder.length)%playOrder.length;
    clearStack();
    showPhoto(ni);
  }
}
function togglePlayPause(){
  playing=!playing;
  bpp.innerHTML=playing?'&#10074;&#10074;':'&#9654;';
  if(playing)schedNext();else clearTimeout(timer);
}
function toggleFs(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function showCtrl(){
  ctrl.classList.add('visible');document.body.style.cursor='default';
  clearTimeout(hct);
  hct=setTimeout(function(){
    if(playing&&sl.classList.contains('active')){
      ctrl.classList.remove('visible');document.body.style.cursor='none';
    }
  },3000);
}
document.addEventListener('mousemove',function(){
  if(sl.classList.contains('active'))showCtrl();
});

document.addEventListener('keydown',function(e){
  if(!sl.classList.contains('active')){
    if(e.key==='Enter'){e.preventDefault();startShow()}
    return;
  }
  showCtrl();
  switch(e.key){
    case' ':case'k':e.preventDefault();togglePlayPause();break;
    case'ArrowRight':case'l':nextSlide();break;
    case'ArrowLeft':case'j':prevSlide();break;
    case'f':toggleFs();break;
    case'Escape':backToStart();break;
  }
});
</script>
</body>
</html>
